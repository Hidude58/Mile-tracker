<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DriveLedger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    .container {
      padding: 16px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    hr {
      border: none;
      border-top: 1px solid #334155;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h2>🚗 DriveLedger</h2>

<div class="container">

  <!-- SHIFT -->
  <div class="card">
    <h3>Shift Entry</h3>
    <input id="startMiles" placeholder="Start Odometer">
    <input id="endMiles" placeholder="End Odometer">
    <input id="earnings" placeholder="Earnings ($)">
    <button onclick="saveShift()">Save Shift</button>
  </div>

  <!-- GAS -->
  <div class="card">
    <h3>Gas (Optional)</h3>
    <input type="file" accept="image/*" capture="environment" onchange="scanReceipt(event)">
    <p id="ocrStatus"></p>

    <input id="gallonsInput" placeholder="Gallons">
    <input id="costInput" placeholder="Total Cost ($)">
    <button onclick="confirmGas()">Save Gas</button>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>Stats</h3>
    <div id="stats"></div>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

<script>
let shifts = JSON.parse(localStorage.getItem('shifts')) || [];
let gas = JSON.parse(localStorage.getItem('gas')) || [];

function save() {
  localStorage.setItem('shifts', JSON.stringify(shifts));
  localStorage.setItem('gas', JSON.stringify(gas));
}

// SAVE SHIFT (FIXED)
function saveShift() {
  let start = parseFloat(document.getElementById("startMiles").value);
  let end = parseFloat(document.getElementById("endMiles").value);
  let earn = parseFloat(document.getElementById("earnings").value);

  if (isNaN(start) || isNaN(end) || isNaN(earn)) {
    alert("Fill all fields");
    return;
  }

  if (end <= start) {
    alert("End must be greater than start");
    return;
  }

  let shift = { start, end, earn };
  shifts.push(shift);

  save();
  updateUI();

  document.getElementById("startMiles").value = "";
  document.getElementById("endMiles").value = "";
  document.getElementById("earnings").value = "";
}

// OCR
async function scanReceipt(e) {
  let file = e.target.files[0];
  if (!file) return;

  ocrStatus.innerText = "Scanning...";

  const result = await Tesseract.recognize(file, 'eng');
  let text = result.data.text.toLowerCase();

  let gallons = text.match(/([0-9]+\.?[0-9]*)\s*(gal|gallons)/);
  let total = text.match(/total[^0-9]*\$?([0-9]+\.?[0-9]*)/);

  if (!total) {
    let prices = [...text.matchAll(/\$([0-9]+\.?[0-9]*)/g)]
      .map(x => parseFloat(x[1]));
    if (prices.length) total = [null, Math.max(...prices)];
  }

  if (gallons) gallonsInput.value = gallons[1];
  if (total) costInput.value = total[1];

  ocrStatus.innerText = "Review & confirm";
}

// SAVE GAS
function confirmGas() {
  let g = parseFloat(gallonsInput.value);
  let c = parseFloat(costInput.value);

  if (isNaN(g) || isNaN(c)) {
    alert("Enter valid gas");
    return;
  }

  gas.push({ gallons: g, cost: c });
  save();
  updateUI();

  gallonsInput.value = "";
  costInput.value = "";
  ocrStatus.innerText = "Saved ✔";
}

// UPDATE UI (FULL FIX)
function updateUI() {
  let totalMiles = shifts.reduce((a,s)=>a+(s.end-s.start),0);
  let totalEarn = shifts.reduce((a,s)=>a+s.earn,0);
  let totalGas = gas.reduce((a,g)=>a+g.cost,0);

  let earnPerMile = totalMiles ? totalEarn / totalMiles : 0;
  let costPerMile = totalMiles && totalGas ? totalGas / totalMiles : 0;

  document.getElementById("stats").innerHTML = `
    Miles: ${totalMiles.toFixed(1)}<br>
    Earned: $${totalEarn.toFixed(2)}<br>
    Earnings per mile: $${earnPerMile.toFixed(2)}<br>
    ${totalGas > 0 ? `Cost per mile: $${costPerMile.toFixed(2)}` : ``}
  `;

  const historyEl = document.getElementById("history");

  if (shifts.length === 0) {
    historyEl.innerHTML = "No shifts yet";
    return;
  }

  historyEl.innerHTML = shifts.map((s, i) => {
    let miles = s.end - s.start;
    let earnPM = miles ? s.earn / miles : 0;

    let profit = totalGas > 0
      ? s.earn - (miles * costPerMile)
      : s.earn;

    return `
      <div>
        <b>Shift ${i + 1}</b><br>
        Miles: ${miles.toFixed(1)}<br>
        Earned: $${s.earn.toFixed(2)}<br>
        $/mile: $${earnPM.toFixed(2)}<br>
        Profit: <span style="color:${profit>=0?'lime':'red'}">$${profit.toFixed(2)}</span>
      </div>
      <hr>
    `;
  }).join("");
}

updateUI();
</script>

</body>
</html>
