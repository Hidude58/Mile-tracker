<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DriveLedger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }

    .container {
      padding: 16px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 18px;
      border-radius: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.98);
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: #0f172a;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    button:active {
      opacity: 0.7;
    }

    .danger { background: #ef4444; }
    .edit { background: #3b82f6; }

    .shift {
      background: #0f172a;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .shift-header {
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

    .shift-details {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="header">🚗 DriveLedger</div>

<div class="container">

  <div class="card">
    <h3>Add Shift</h3>
    <input id="startMiles" placeholder="Start Odometer">
    <input id="endMiles" placeholder="End Odometer">
    <input id="earnings" placeholder="Earnings ($)">
    <button onclick="saveShift()">Save Shift</button>
  </div>

  <div class="card">
    <h3>Sort</h3>
    <select id="sortType" onchange="updateUI()">
      <option value="new">Newest</option>
      <option value="old">Oldest</option>
      <option value="earn">Highest $</option>
      <option value="miles">Most Miles</option>
    </select>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <div id="stats"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

  <div class="footer">
    DriveLedger • Mileage Tracker
  </div>

</div>

<script>
let shifts = JSON.parse(localStorage.getItem('shifts')) || [];

function save() {
  localStorage.setItem('shifts', JSON.stringify(shifts));
}

function saveShift() {
  let start = parseFloat(startMiles.value);
  let end = parseFloat(endMiles.value);
  let earn = parseFloat(earnings.value);

  if (isNaN(start) || isNaN(end) || isNaN(earn)) return alert("Fill all fields");
  if (end <= start) return alert("End must be higher");

  shifts.push({
    id: Date.now(),
    start,
    end,
    earn,
    time: Date.now()
  });

  save();
  updateUI();

  startMiles.value = "";
  endMiles.value = "";
  earnings.value = "";
}

function deleteShift(id) {
  if (!confirm("Delete shift?")) return;
  shifts = shifts.filter(s => s.id !== id);
  save();
  updateUI();
}

function editShift(id) {
  let s = shifts.find(x => x.id === id);

  let start = parseFloat(prompt("Start miles:", s.start));
  let end = parseFloat(prompt("End miles:", s.end));
  let earn = parseFloat(prompt("Earnings:", s.earn));

  if (isNaN(start) || isNaN(end) || isNaN(earn)) return;

  s.start = start;
  s.end = end;
  s.earn = earn;

  save();
  updateUI();
}

function toggleDetails(id) {
  let el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function getSortedShifts() {
  let type = document.getElementById("sortType").value;
  let arr = [...shifts];

  if (type === "new") arr.sort((a,b)=>b.time-a.time);
  if (type === "old") arr.sort((a,b)=>a.time-b.time);
  if (type === "earn") arr.sort((a,b)=>b.earn-a.earn);
  if (type === "miles") arr.sort((a,b)=>(b.end-b.start)-(a.end-a.start));

  return arr;
}

function updateUI() {
  const statsEl = document.getElementById("stats");
  const historyEl = document.getElementById("history");

  let sorted = getSortedShifts();

  let totalMiles = shifts.reduce((a,s)=>a+(s.end-s.start),0);
  let totalEarn = shifts.reduce((a,s)=>a+s.earn,0);
  let earnPerMile = totalMiles ? totalEarn / totalMiles : 0;

  statsEl.innerHTML = `
    Miles: ${totalMiles.toFixed(1)}<br>
    Earned: $${totalEarn.toFixed(2)}<br>
    $/mile: $${earnPerMile.toFixed(2)}
  `;

  historyEl.innerHTML = "";

  if (sorted.length === 0) {
    historyEl.innerHTML = "No shifts yet";
    return;
  }

  sorted.forEach((s, i) => {
    let miles = s.end - s.start;
    let earnPM = miles ? s.earn / miles : 0;

    let div = document.createElement("div");
    div.className = "shift";

    div.innerHTML = `
      <div class="shift-header" onclick="toggleDetails('d${i}')">
        <span>$${s.earn.toFixed(2)}</span>
        <span>${miles.toFixed(1)} mi</span>
      </div>

      <div class="shift-details" id="d${i}">
        Miles: ${miles.toFixed(1)}<br>
        $/mile: $${earnPM.toFixed(2)}<br>

        <button class="edit" onclick="editShift(${s.id})">Edit</button>
        <button class="danger" onclick="deleteShift(${s.id})">Delete</button>
      </div>
    `;

    historyEl.appendChild(div);
  });
}

updateUI();
</script>

</body>
</html>
