<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DriveLedger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    .container {
      padding: 16px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .danger { background: #ef4444; }
    .edit { background: #3b82f6; }

    .shift {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .shift-header {
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      font-weight: bold;
    }

    .shift-details {
      display: none;
      margin-top: 10px;
    }

    hr {
      border: none;
      border-top: 1px solid #334155;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h2>🚗 DriveLedger</h2>

<div class="container">

  <div class="card">
    <h3>Shift Entry</h3>
    <input id="startMiles" placeholder="Start Odometer">
    <input id="endMiles" placeholder="End Odometer">
    <input id="earnings" placeholder="Earnings ($)">
    <button onclick="saveShift()">Save Shift</button>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <div id="stats"></div>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history"></div>
  </div>

</div>

<script>
let shifts = JSON.parse(localStorage.getItem('shifts')) || [];

function save() {
  localStorage.setItem('shifts', JSON.stringify(shifts));
}

// SAVE
function saveShift() {
  let start = parseFloat(startMiles.value);
  let end = parseFloat(endMiles.value);
  let earn = parseFloat(earnings.value);

  if (isNaN(start) || isNaN(end) || isNaN(earn)) return alert("Fill all fields");
  if (end <= start) return alert("End must be higher");

  shifts.push({ start, end, earn });
  save();
  updateUI();

  startMiles.value = "";
  endMiles.value = "";
  earnings.value = "";
}

// DELETE
function deleteShift(index) {
  if (!confirm("Delete this shift?")) return;
  shifts.splice(index, 1);
  save();
  updateUI();
}

// EDIT
function editShift(index) {
  let s = shifts[index];

  let start = prompt("Start miles:", s.start);
  let end = prompt("End miles:", s.end);
  let earn = prompt("Earnings:", s.earn);

  start = parseFloat(start);
  end = parseFloat(end);
  earn = parseFloat(earn);

  if (isNaN(start) || isNaN(end) || isNaN(earn)) {
    alert("Invalid input");
    return;
  }

  shifts[index] = { start, end, earn };
  save();
  updateUI();
}

// TOGGLE DROPDOWN
function toggleDetails(id) {
  let el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

// UI
function updateUI() {
  let totalMiles = shifts.reduce((a,s)=>a+(s.end-s.start),0);
  let totalEarn = shifts.reduce((a,s)=>a+s.earn,0);
  let earnPerMile = totalMiles ? totalEarn / totalMiles : 0;

  stats.innerHTML = `
    Miles: ${totalMiles.toFixed(1)}<br>
    Earned: $${totalEarn.toFixed(2)}<br>
    $/mile: $${earnPerMile.toFixed(2)}
  `;

  if (shifts.length === 0) {
    history.innerHTML = "No shifts yet";
    return;
  }

  history.innerHTML = shifts.map((s, i) => {
    let miles = s.end - s.start;
    let earnPM = miles ? s.earn / miles : 0;

    return `
      <div class="shift">
        <div class="shift-header" onclick="toggleDetails('d${i}')">
          <span>Shift ${i+1}</span>
          <span>$${s.earn.toFixed(2)}</span>
        </div>

        <div class="shift-details" id="d${i}">
          Miles: ${miles.toFixed(1)}<br>
          $/mile: $${earnPM.toFixed(2)}<br>

          <button class="edit" onclick="editShift(${i})">Edit</button>
          <button class="danger" onclick="deleteShift(${i})">Delete</button>
        </div>
      </div>
    `;
  }).join("");
}

updateUI();
</script>

</body>
</html>
